version: "3.9"

services:
  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.3
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE:      welltune
      MYSQL_USER:          welltune
      MYSQL_PASSWORD:      welltune_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-hwelltune", "-pwelltune_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:           4000
      JWT_SECRET:     change_me_in_production
      DB_HOST:        db
      DB_PORT:        3306
      DB_USER:        welltune
      DB_PASS:        welltune_pass
      DB_NAME:        welltune
      CLIENT_ORIGIN:  http://localhost:5173
    ports:
      - "4000:4000"

  # ── Frontend Dev Server (optional) ─────────────────────────────────────────
  # Remove this service if you want to run the frontend locally with `npm run dev`
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"

volumes:
  mysql_data:
